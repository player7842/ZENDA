<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:24px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 45% at 12% 88%,rgba(57,169,0,.07) 0%,transparent 50%),radial-gradient(ellipse 40% 35% at 88% 12%,rgba(57,169,0,.05) 0%,transparent 50%);pointer-events:none}
.auth-wrap{width:100%;max-width:400px;animation:fadeUp .35s var(--ease-soft) both}
.auth-card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-xl);padding:36px 32px;box-shadow:var(--shadow)}
.auth-logo{display:flex;justify-content:center;margin-bottom:28px}
.auth-logo img{height:36px;width:auto;max-width:180px}
.auth-title{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-.3px}
.auth-sub{font-size:.8rem;color:var(--text-3);margin-bottom:24px;font-weight:500}
.auth-footer{text-align:center;font-size:.78rem;color:var(--text-3);margin-top:18px}
.auth-footer a{color:var(--green);font-weight:700}
.theme-btn{position:fixed;top:18px;right:18px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-sm);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);font-size:.9rem;transition:all .15s}
.theme-btn:hover{background:var(--bg-3);color:var(--green)}
</style>
</head>

    <div class="auth-title">Bienvenido</div>
    <div class="auth-sub">Inicia sesion para continuar</div>
    <div class="field">
      <label class="label">Correo institucional</label>
      <div class="input-icon-wrap">
        <i class="bi bi-envelope input-icon"></i>
        <input type="email" class="input" id="inp-email" placeholder="usuario@misena.edu.co"/>
      </div>
    </div>
    <div class="field">
      <label class="label">Contrasena</label>
      <div class="input-icon-wrap">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" class="input" id="inp-pass" placeholder="••••••••"/>
        <button class="input-action toggle-password" data-target="#inp-pass" type="button"><i class="bi bi-eye"></i></button>
      </div>
    </div>
    <div style="text-align:right;margin-bottom:18px">
      <a href="pages/recuperar.html" style="font-size:.73rem;color:var(--green);font-weight:600">Olvidaste tu contrasena?</a>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Iniciar sesion</button>
    <div class="auth-footer">No tienes cuenta? <a href="pages/registro.html">Registrate</a></div>
  </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
function doLogin(){
  var email=document.getElementById('inp-email').value.trim();
  var pass=document.getElementById('inp-pass').value;
  if(!email||!pass){toast('Completa todos los campos','warn');return;}
  window.location.href='pages/dashboard.html';
}
document.getElementById('inp-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body></html>
